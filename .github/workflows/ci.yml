name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_test
      JWT_SECRET: test-jwt-secret
      JWT_EXPIRES_IN: 1h
      CORS_ORIGIN: http://localhost:3001
      API_PREFIX: api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run --filter @microcatalog/backend lint

      - name: Format check
        run: pnpm run --filter @microcatalog/backend format:check

      - name: Type check
        run: pnpm run --filter @microcatalog/backend type-check

      - name: Push DB schema (test)
        run: pnpm run --filter @microcatalog/backend db:push

      - name: Tests
        run: pnpm run --filter @microcatalog/backend test:cov

      - name: Build
        run: pnpm run --filter @microcatalog/backend build
